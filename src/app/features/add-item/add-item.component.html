<ion-content class="add-content">
  <div class="page-wrapper">
    <ion-list>
      <ion-list>
        <ion-item>
          <ion-label position="stacked">Завантажити фото (JPG, PNG)</ion-label>
          <input
            type="file"
            accept=".jpg,.jpeg,.png"
            (change)="onFileSelected($event)"
          />
        </ion-item>
        <ion-item>
          <ion-input label="Tytul" placeholder="Enter text"></ion-input>
        </ion-item>

        <ion-item>
          <ion-input label="Autor" type="number" placeholder="000"></ion-input>
        </ion-item>

        <ion-item>
          <ion-input
            label="Password input"
            type="password"
            value="password"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-input
            label="Email input"
            type="email"
            placeholder="email@domain.com"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-input
            label="Telephone input"
            type="tel"
            placeholder="888-888-8888"
          ></ion-input>
        </ion-item>
      </ion-list>
    </ion-list>
  </div>
</ion-content>
