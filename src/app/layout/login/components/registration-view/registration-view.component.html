<form [formGroup]="registrationForm" (submit)="registrationSubmit()"> <ion-list>
    <ion-item>
      <ion-input label="Imię" formControlName="first_name" placeholder="Imię"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Nazwisko" formControlName="last_name" placeholder="Nazwiśko"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Nickname" formControlName="username" placeholder="Nickname"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Email" type="email" formControlName="email" placeholder="email@domain.com"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Hasło" type="password" formControlName="password"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Powtórz hasło" type="password" formControlName="confirm_password"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Telephone" type="tel" formControlName="phone_number" placeholder="888-888-8888"></ion-input>
    </ion-item>
  </ion-list>
  <ion-button expand="block" fill="outline" type="submit">
    Zarejestruj
  </ion-button>

</form>
