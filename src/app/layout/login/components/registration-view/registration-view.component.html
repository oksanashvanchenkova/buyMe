<form [formGroup]="registrationForm" (submit)="registrationSubmit()"> <ion-list>
    <ion-item>
      <ion-input label="Imię" formControlName="firstName" placeholder="Imię"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Nazwisko" formControlName="lastName" placeholder="Nazwiśko"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Email" type="email" formControlName="email" placeholder="email@domain.com"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Hasło" type="password" formControlName="password"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Powtórz hasło" type="password" formControlName="confirmPassword"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Telephone" type="tel" formControlName="phoneNumber" placeholder="888-888-8888"></ion-input>
    </ion-item>
  </ion-list>
  <ion-button expand="block" fill="outline" type="submit">
    Zarejestruj
  </ion-button>
  <ion-button expand="block" (click)="hideRegistration()">
    Wróc
  </ion-button>

</form>
