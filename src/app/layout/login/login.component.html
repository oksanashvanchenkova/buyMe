<ion-content class="home-content">

  <div class="page-wrapper">
    @if(store.isPending()){
    <div style="background-color: red;height: 3rem;width: 100%;">Pending...</div>
    }
    {{store.showRegistr()}}
    @if(showRegistr()){
    <app-registration-view (onHideRegistration)="hideRegistration()"></app-registration-view>


    } @else {
    <app-login-view class="login-view" (onShowRegistration)="showRegistration()"></app-login-view>
    }

  </div>
</ion-content>
