<ion-header>
  <ion-toolbar class="header-toolbar">
    <ion-buttons slot="start">
      <ion-button href="/home">
        <img src="../../../assets/logo/logo.png" height="36"
      /></ion-button>
    </ion-buttons>
    <ion-buttons slot="end" (click)="logOut()">
      <ion-button href="/home"> LogOut</ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      @if (!loginStore.user() && !userFromSessiom) {
        <ion-button fill="clear" (click)="goToLogin()">
          <ion-icon name="person-circle" class="user-icon"></ion-icon>
        </ion-button>
      } @else {
        <ion-button fill="clear" (click)="goToProfile()">
          <span>{{ loginStore.user()?.firstName ?? userFromSessiom }}</span>
        </ion-button>
      }
    </ion-buttons>
  </ion-toolbar>
</ion-header>
